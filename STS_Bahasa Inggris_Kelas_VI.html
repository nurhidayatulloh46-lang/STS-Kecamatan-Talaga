<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumatif Tengah Semester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        
        :root {
            /* Tema Default (Ceria) */
            --bg-color: #f0f9ff;
            --card-bg: #ffffff;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --secondary: #f43f5e;
            --text-main: #334155;
            --font-family: 'Fredoka', sans-serif;
            --radius: 20px;
        }

        /* Tema: Pastel Lembut */
        .theme-pastel {
            --bg-color: #fdf4ff;
            --card-bg: #ffffff;
            --primary: #d946ef;
            --primary-hover: #c026d3;
            --secondary: #14b8a6;
            --text-main: #475569;
        }

        /* Tema: Edukasi Modern */
        .theme-modern {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #10b981;
            --text-main: #1e293b;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --radius: 12px;
        }

        /* Tema: Game Gelap */
        .theme-game {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #f59e0b;
            --text-main: #f8fafc;
        }

        /* Tema: Klasik Papan Tulis */
        .theme-klasik {
            --bg-color: #14532d;
            --card-bg: #166534;
            --primary: #fcd34d;
            --primary-hover: #fbbf24;
            --secondary: #fca5a5;
            --text-main: #ffffff;
            --font-family: 'Courier New', Courier, monospace;
            --radius: 8px;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1, h2, h3 { color: var(--primary); text-align: center; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 10px; font-family: inherit; font-size: 1rem;
            box-sizing: border-box; background: transparent; color: inherit;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        .editor-container {
            border: 2px dashed var(--primary);
            min-height: 200px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.5);
            font-size: 1.1rem;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 500px;
            color: #333; /* Supaya teks di editor tetap terbaca walau tema gelap */
            background-color: #fff;
        }

        .editor-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 10px 0;
            border-radius: 8px;
        }

        .editor-container:focus { outline: none; border-color: var(--secondary); background: #fff; }

        button {
            background: var(--primary); color: white; border: none;
            padding: 12px 25px; font-size: 1.1rem; border-radius: 10px;
            cursor: pointer; font-family: inherit; font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: var(--secondary); }
        .btn-secondary:hover { opacity: 0.9; }
        
        /* Gaya Tampilan Kuis Siswa */
        #quiz-app { display: none; }
        .question-card {
            background: var(--card-bg); padding: 30px; border-radius: var(--radius);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 20px;
            text-align: center; border: 3px solid #e2e8f0;
        }
        .question-text { font-size: 1.5rem; margin-bottom: 25px; font-weight: 500; text-align: left; display: flow-root; }
        
        .question-text img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
            display: block;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .option-btn {
            background: #f8fafc; color: #334155; border: 2px solid #cbd5e1;
            padding: 15px 20px; font-size: 1.2rem; border-radius: 15px;
            text-align: left; transition: all 0.2s; cursor: pointer; display: flex; align-items: center;
        }
        .option-btn:hover { background: #e0f2fe; border-color: var(--primary); transform: translateX(5px); }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary-hover); transform: scale(1.02); }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
        
        .progress-bar { width: 100%; height: 15px; background: #e2e8f0; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.4s ease; }

        .timer-badge {
            background: var(--secondary); color: white; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; display: inline-block;
            margin-bottom: 20px; font-size: 1.2rem; animation: pulse 2s infinite;
        }

        #cover-screen { text-align: center; padding: 40px 20px; }
        .cover-title { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .cover-detail { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        /* Layar Selesai & Review */
        #result-screen { text-align: center; padding: 30px; display: none; }
        .review-box {
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px;
            padding: 20px; margin-bottom: 20px; text-align: left; color: #333;
        }
        .review-box.essay-review { border-color: var(--primary); }

        /* Gaya Khusus Panel Review & Edit */
        .edit-box {
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 10px;
            background: #fff;
            min-height: 40px;
            margin-bottom: 10px;
            font-family: inherit;
            transition: all 0.2s;
            display: flow-root; /* Penting agar gambar tidak keluar kotak saat di-float kiri/kanan */
        }
        .edit-box:focus {
            outline: none;
            border-color: var(--primary);
            background: #f0f9ff;
        }
        .review-item-container {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .review-item-container img {
            max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px; display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>

                        <p><strong>Waktu:</strong> ${activeQuizData.config.timer > 0 ? activeQuizData.config.timer + ' Menit' : 'Tidak Dibatasi'}</p>
                    </div>
                    <button onclick="startQuiz()" style="font-size: 1.3rem; padding: 15px 40px; border-radius: 30px;">
                        🚀 MULAI KUIS SEKARANG!
                    </button>
                    <br>
                    <button onclick="goHome()" class="btn-secondary" style="font-size: 1rem; padding: 10px 20px; border-radius: 20px; margin-top: 20px; background: #94a3b8; border: none;">
                        🏠 Kembali ke Pengaturan
                    </button>
                </div>
            `;
        }
                function startQuiz() {
            if (activeQuizData.config.timer > 0) {
                quizState.timeRemaining = activeQuizData.config.timer * 60;
                startTimer();
            }
            renderQuestion();
        }
                function startTimer() {
            clearInterval(quizState.timerInterval);
            quizState.timerInterval = setInterval(() => {
                quizState.timeRemaining--;
                updateTimerUI();
                if (quizState.timeRemaining <= 0) {
                    clearInterval(quizState.timerInterval);
                    alert("Waktu Habis!");
                    finishQuiz();
                }
            }, 1000);
        }
                function updateTimerUI() {
            const timerEl = document.getElementById('timer-display');
            if(!timerEl) return;
            let m = Math.floor(quizState.timeRemaining / 60);
            let s = quizState.timeRemaining % 60;
            timerEl.innerText = `⏳ Sisa Waktu: ${m}:${s < 10 ? '0'+s : s}`;
        }
                function renderQuestion() {
            const app = document.getElementById('quiz-app');
            const q = activeQuizData.parsedQuestions[quizState.currentIdx];
            const total = activeQuizData.parsedQuestions.length;
            const progressPct = ((quizState.currentIdx) / total) * 100;

            let timerHTML = activeQuizData.config.timer > 0 ? `<div id="timer-display" class="timer-badge"></div>` : '';

            let contentHTML = '';
            if (q.type === 'mcq') {
                contentHTML = `<div class="options-grid">`;
                q.options.forEach((opt, idx) => {
                    const isSelected = quizState.answers[quizState.currentIdx] === idx ? 'selected' : '';
                    const label = String.fromCharCode(97 + idx); // Menggunakan huruf kecil a, b, c...
                    // Modifikasi div isi opsi untuk membungkus gambar float dengan aman menggunakan display: flow-root
                    contentHTML += `
                        <button class="option-btn ${isSelected}" onclick="selectOption(${idx})">
                            <strong style="margin-right: 15px; background: rgba(0,0,0,0.1); padding: 5px 12px; border-radius: 8px;">${label}</strong>
                            <div style="width: 100%; display: flow-root; text-align: left;">${opt}</div>
                        </button>
                    `;
                });
                contentHTML += `</div>`;
            } else {
                // Tampilan Khusus Soal Uraian di Proyektor
                contentHTML = `
                    <div style="background: #f8fafc; border: 2px dashed #cbd5e1; padding: 30px; border-radius: 15px; color: #64748b; margin-top: 20px; text-align: center;">
                        ✍️ <strong style="font-size: 1.2rem;">Soal Uraian / Essay</strong><br><br>
                        <span style="font-size: 1.1rem;">Silakan kerjakan / jawab di buku tugas atau lembar jawaban masing-masing.</span>
                    </div>`;
            }

            app.innerHTML = `
                <div style="text-align: center;">${timerHTML}</div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${progressPct}%"></div></div>
                <div class="question-card">
                    <div style="font-weight: bold; color: var(--secondary); margin-bottom: 10px; text-transform: uppercase;">
                        Pertanyaan ${quizState.currentIdx + 1} dari ${total}
                    </div>
                    <div class="question-text">${q.text}</div>
                    ${contentHTML}
                </div>
                <div class="nav-buttons">
                    <button onclick="prevQuestion()" ${quizState.currentIdx === 0 ? 'style="visibility:hidden"' : ''} class="btn-secondary">⬅️ Sebelumnya</button>
                    ${quizState.currentIdx === total - 1 
                        ? `<button onclick="finishQuiz()" style="background: #10b981;">Kumpulkan ✅</button>` 
                        : `<button onclick="nextQuestion()">Selanjutnya ➡️</button>`}
                </div>
            `;
            updateTimerUI();
        }
                function selectOption(idx) {
            quizState.answers[quizState.currentIdx] = idx;
            renderQuestion();
        }
                function nextQuestion() { quizState.currentIdx++; renderQuestion(); }
                function prevQuestion() { quizState.currentIdx--; renderQuestion(); }
                function finishQuiz() {
            clearInterval(quizState.timerInterval);
            const app = document.getElementById('quiz-app');
            
            let reviewHTML = '';
            activeQuizData.parsedQuestions.forEach((q, i) => {
                let ans = quizState.answers[i];
                if (q.type === 'mcq') {
                    let ansText = ans !== null ? q.options[ans] : '<i style="color:red">Tidak dijawab</i>';
                    reviewHTML += `
                        <div class="review-box">
                            <strong>${i+1}. ${q.text}</strong><br>
                            <span style="color: var(--primary)">Jawaban Pilihan:</span> <br>${ansText}
                        </div>`;
                } else {
                    reviewHTML += `
                        <div class="review-box essay-review">
                            <strong>${i+1}. [URAIAN] <br>${q.text}</strong><br><br>
                            <em style="color: var(--secondary);">* Jawaban dikerjakan di buku tugas siswa.</em>
                        </div>`;
                }
            });

            app.innerHTML = `
                <div id="result-screen" style="display: block;">
                    <h1 style="font-size: 3rem;">🎉 Selesai!</h1>
                    <h2>Kerja bagus, Semuanya!</h2>
                    <p style="font-size: 1.2rem; margin-bottom: 30px;">Kuis telah berakhir. Guru dapat mengecek kembali soal di bawah ini.</p>
                    <button onclick="window.print()" class="btn-secondary" style="margin-bottom: 30px;">🖨️ Cetak / Simpan PDF</button>
                    <button onclick="goHome()" style="margin-bottom: 30px; margin-left: 10px; background: #64748b; color: white;">🏠 Kembali ke Beranda</button>
                    
                    <div style="text-align: left;">
                        ${reviewHTML}
                    </div>
                </div>
            `;
        }
                function goHome() {
            const teacherPanel = document.getElementById('teacher-panel');
            if (teacherPanel) {
                // Mode Web Biasa
                clearInterval(quizState.timerInterval);
                document.getElementById('quiz-app').style.display = 'none';
                
                // Pastikan panel review juga tertutup
                const reviewPanel = document.getElementById('review-panel');
                if(reviewPanel) reviewPanel.style.display = 'none';

                teacherPanel.style.display = 'block';
                document.body.className = ''; // Reset tema ke default
                
                // Reset State
                quizState = { currentIdx: 0, answers: [], timeRemaining: 0, timerInterval: null };
                activeQuizData = null;
            } else {
                // Mode File HTML Standalone (Siswa/Offline) - Refresh untuk mulai ulang
                window.location.reload();
            }
        }

                window.onload = () => {
                    document.body.className = activeQuizData.config.theme;
                    document.getElementById('quiz-app').style.display = 'block';
                    renderCover();
                };
            </script>
</body>
</html>
